name: Daily ETF Comparison Update

#固定以下分鐘跑
on:
  schedule:
    # 第一次：台灣時間 17:43 (UTC 09:43) - 數據剛產出的第一時間
    - cron: '43 9 * * *' 
    # 第二次：台灣時間 18:43 (UTC 10:43) - 第一次若被延遲的保險補跑
    - cron: '43 10 * * *'
    # 第三次：台灣時間 19:43 (UTC 11:43) - 確保萬無一失的深夜最終檢查
    - cron: '43 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run ETF Tracker
        run: python etf_tracker.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto update ETF comparison: $(date)" || exit 0
          git push
